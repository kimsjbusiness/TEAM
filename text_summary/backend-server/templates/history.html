<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요약 내역 - AI 텍스트 요약기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            color: #333;
            text-align: center;
        }

        .history-list {
            list-style: none;
            padding: 0;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .history-item:hover {
            background-color: #f9f9f9;
        }

        .history-title {
            font-weight: bold;
            font-size: 18px;
            color: #007bff;
        }

        .history-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .detail-view {
            display: none;
            margin-top: 30px;
            border-top: 2px solid #333;
            padding-top: 20px;
        }

        .back-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .result-box {
            background-color: #f9f9f9;
            border: 1px solid #e1e1e1;
            padding: 15px;
            border-radius: 6px;
        }

        .result-box h3 {
            margin-top: 0;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            font-size: 18px;
        }

        .result-content {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
        }

        .nav-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .nav-link a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="nav-link">
        <a href="/">🏠 메인으로 돌아가기</a>
    </div>

    <div class="container">
        <h1>저장된 요약 내역</h1>

        <div id="listView">
            <ul class="history-list">
                {% for item in history %}
                <li class="history-item" onclick="showDetail('{{ item.id }}')">
                    <div class="history-date">{{ item.timestamp }}</div>
                    <div class="history-title">{{ item.title }}</div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div id="detailView" class="detail-view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="back-btn" onclick="hideDetail()" style="margin-bottom: 0;">⬅ 목록으로 돌아가기</button>
                <button class="delete-btn" onclick="deleteItem()"
                    style="background-color: #dc3545; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">🗑️
                    삭제하기</button>
            </div>
            <h2 id="detailTitle">제목</h2>
            <div id="detailContent"
                style="white-space: pre-wrap; margin-bottom: 30px; padding: 15px; background: #eee; border-radius: 5px;">
            </div>

            <div class="results-container" id="detailResults">
                <!-- 상세 결과가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>

    <script>
        let currentItemId = null;

        async function showDetail(id) {
            currentItemId = id;
            try {
                const response = await fetch('/history/' + id);
                const data = await response.json();

                if (data.error) {
                    alert('데이터를 불러올 수 없습니다.');
                    return;
                }

                document.getElementById('listView').style.display = 'none';
                document.getElementById('detailView').style.display = 'block';

                document.getElementById('detailTitle').textContent = data.title;
                document.getElementById('detailContent').textContent = data.context; // 원문 표시

                const methods = [
                    { key: 'ollama', name: '🤖 AI (gemma3:27b)' },
                    { key: 'tf_idf', name: '📊 TF-IDF' },
                    { key: 'text_rank', name: '🕸️ TextRank' },
                    { key: 'lsa', name: '📐 LSA (잠재 의미 분석)' },
                    { key: 'lex_rank', name: '🔗 LexRank' },
                    { key: 'mmr', name: '🔀 MMR (중복 제거)' }
                ];

                const resultsDiv = document.getElementById('detailResults');
                resultsDiv.innerHTML = '';

                const scores = data.scores || {};

                methods.forEach(method => {
                    const box = document.createElement('div');
                    box.className = 'result-box';

                    let scoreHtml = '';
                    if (method.key !== 'ollama') {
                        const mScores = scores[method.key];
                        if (mScores) {
                            const rouge = mScores.rouge;
                            const bert = mScores.bert;

                            scoreHtml += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #666;">';

                            if (rouge) {
                                scoreHtml += `<div><strong>ROUGE:</strong> R-1: ${rouge.r1.toFixed(4)}, R-2: ${rouge.r2.toFixed(4)}, R-L: ${rouge.rl.toFixed(4)}</div>`;
                            } else {
                                scoreHtml += `<div><strong>ROUGE:</strong> N/A</div>`;
                            }

                            if (bert) {
                                scoreHtml += `<div><strong>BERT:</strong> P: ${bert.p.toFixed(4)}, R: ${bert.r.toFixed(4)}, F1: ${bert.f1.toFixed(4)}</div>`;
                            } else {
                                scoreHtml += `<div><strong>BERT:</strong> N/A</div>`;
                            }

                            scoreHtml += '</div>';
                        } else {
                            scoreHtml += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #666;">Waiting for calculation or N/A</div>';
                        }
                    } else {
                        scoreHtml += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #007bff;"><strong>Reference (Ground Truth)</strong></div>';
                    }

                    box.innerHTML = `
                        <h3>${method.name}</h3>
                        <div class="result-content">${data[method.key] || '결과 없음'}</div>
                        ${scoreHtml}
                    `;
                    resultsDiv.appendChild(box);
                });

            } catch (error) {
                alert('오류가 발생했습니다: ' + error.message);
            }
        }

        async function deleteItem() {
            if (!currentItemId) return;

            if (!confirm('정말로 이 요약 내역을 삭제하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch('/history/' + currentItemId, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (response.ok) {
                    alert('삭제되었습니다.');
                    location.reload(); // 목록 갱신을 위해 새로고침
                } else {
                    alert('삭제 실패: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('오류가 발생했습니다: ' + error.message);
            }
        }

        function hideDetail() {
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
            currentItemId = null;
        }
    </script>
</body>

</html>

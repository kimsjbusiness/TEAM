<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 텍스트 요약기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .result-box {
            background-color: #f9f9f9;
            border: 1px solid #e1e1e1;
            padding: 15px;
            border-radius: 6px;
        }

        .result-box h3 {
            margin-top: 0;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            font-size: 18px;
        }

        .result-content {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            display: none;
            margin-top: 20px;
            font-weight: bold;
            color: #007bff;
        }

        .save-section {
            text-align: center;
            margin-top: 30px;
            display: none;
        }

        .save-btn {
            background-color: #28a745;
            width: auto;
            display: inline-block;
            padding: 10px 30px;
        }

        .save-btn:hover {
            background-color: #218838;
        }

        .nav-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .nav-link a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 16px;
            color: #555;
            margin-bottom: -2px;
            margin-top: 0;
            width: auto;
        }

        .tab-btn.active {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            font-weight: bold;
        }

        .tab-btn:hover {
            color: #0056b3;
            background: none;
        }
    </style>
</head>

<body>
    <div class="nav-link">
        <a href="/history">📂 저장된 요약 내역 보기</a>
    </div>

    <div class="container">
        <h1>AI 텍스트 요약기</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('manual')">📝 직접 입력</button>
            <button class="tab-btn" onclick="switchTab('url')">🌐 URL 입력</button>
        </div>

        <div id="urlInputSection" style="display: none; margin-bottom: 20px;">
            <div class="input-group">
                <label for="articleUrl">기사 URL</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="articleUrl" placeholder="https://www.aitimes.com/...">
                    <button onclick="fetchUrl()" style="width: 120px; margin-top: 0;">가져오기</button>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label for="title">제목</label>
            <input type="text" id="title" placeholder="기사 제목을 입력하세요">
        </div>

        <div class="input-group">
            <label for="context">본문 내용</label>
            <textarea id="context" placeholder="요약할 텍스트를 입력하세요..."></textarea>
        </div>

        <button onclick="summarize()" id="summarizeBtn">요약하기</button>
        <div class="loading" id="loading">AI가 열심히 요약 중입니다... 잠시만 기다려주세요 🤖</div>

        <div class="results-container" id="results">
            <!-- 결과가 여기에 표시됩니다 -->
        </div>

        <div class="save-section" id="saveSection">
            <button onclick="saveResults()" class="save-btn">💾 결과 저장하기</button>
        </div>
    </div>

    <script>
        let currentResults = null;

        function switchTab(mode) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (mode === 'manual') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('urlInputSection').style.display = 'none';
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('urlInputSection').style.display = 'block';
            }
        }

        async function fetchUrl() {
            const url = document.getElementById('articleUrl').value;
            if (!url) {
                alert('URL을 입력해주세요.');
                return;
            }

            try {
                const response = await fetch('/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('title').value = data.title;
                    document.getElementById('context').value = data.content;
                    switchTab('manual'); // 내용 확인을 위해 수동 탭으로 전환
                    alert('기사 내용을 가져왔습니다.');
                } else {
                    alert('오류: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('요청 중 오류 발생: ' + error.message);
            }
        }

        async function summarize() {
            const title = document.getElementById('title').value;
            const context = document.getElementById('context').value;

            if (!context) {
                alert("본문 내용을 입력해주세요!");
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('summarizeBtn').disabled = true;
            document.getElementById('results').innerHTML = '';
            document.getElementById('saveSection').style.display = 'none';

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, text: context })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                currentResults = data;

                const methods = [
                    { key: 'ollama', name: '🤖 AI (gemma3:27b)' },
                    { key: 'tf_idf', name: '📊 TF-IDF' },
                    { key: 'text_rank', name: '🕸️ TextRank' },
                    { key: 'lsa', name: '📐 LSA (잠재 의미 분석)' },
                    { key: 'lex_rank', name: '🔗 LexRank' },
                    { key: 'mmr', name: '🔀 MMR (중복 제거)' }
                ];

                const resultsDiv = document.getElementById('results');

                const scores = data.scores || {};

                methods.forEach(method => {
                    const box = document.createElement('div');
                    box.className = 'result-box';

                    let scoreHtml = '';
                    if (method.key !== 'ollama') {
                        const mScores = scores[method.key];
                        if (mScores) {
                            const rouge = mScores.rouge;
                            const bert = mScores.bert;

                            scoreHtml += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #666;">';

                            if (rouge) {
                                scoreHtml += `<div><strong>ROUGE:</strong> R-1: ${rouge.r1.toFixed(4)}, R-2: ${rouge.r2.toFixed(4)}, R-L: ${rouge.rl.toFixed(4)}</div>`;
                            } else {
                                scoreHtml += `<div><strong>ROUGE:</strong> N/A</div>`;
                            }

                            if (bert) {
                                scoreHtml += `<div><strong>BERT:</strong> P: ${bert.p.toFixed(4)}, R: ${bert.r.toFixed(4)}, F1: ${bert.f1.toFixed(4)}</div>`;
                            } else {
                                scoreHtml += `<div><strong>BERT:</strong> N/A</div>`;
                            }

                            scoreHtml += '</div>';
                        }
                    } else {
                        scoreHtml += '<div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 13px; color: #007bff;"><strong>Reference (Ground Truth)</strong></div>';
                    }

                    box.innerHTML = `
                        <h3>${method.name}</h3>
                        <div class="result-content">${data[method.key] || '결과 없음'}</div>
                        ${scoreHtml}
                    `;
                    resultsDiv.appendChild(box);
                });

                document.getElementById('saveSection').style.display = 'block';

            } catch (error) {
                alert('요약 중 오류가 발생했습니다: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('summarizeBtn').disabled = false;
            }
        }

        async function saveResults() {
            if (!currentResults) return;

            const title = document.getElementById('title').value || "무제";
            const context = document.getElementById('context').value;

            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        context: context,
                        ...currentResults
                    })
                });

                const resData = await response.json();
                alert('저장되었습니다! (ID: ' + resData.id + ')');
            } catch (error) {
                alert('저장 중 오류가 발생했습니다: ' + error.message);
            }
        }
    </script>
</body>

</html>
